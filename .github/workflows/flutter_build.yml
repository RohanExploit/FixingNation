name: Build Android Release

"on":
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        name: Build APK and AAB
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  cache: true
                  # Optional: specify a particular flutter version if needed
                  # flutter-version: '3.19.0'

            - name: Install dependencies
              working-directory: ./flutter_app
              run: flutter pub get

            - name: Analyze code
              working-directory: ./flutter_app
              run: flutter analyze

            - name: Build APK (Release)
              working-directory: ./flutter_app
              run: flutter build apk --release

            - name: Build AppBundle (Release)
              working-directory: ./flutter_app
              run: flutter build appbundle --release

            - name: Upload APK Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-release.apk
                  path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
                  retention-days: 7

            - name: Upload AAB Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-release.aab
                  path: flutter_app/build/app/outputs/bundle/release/app-release.aab
                  retention-days: 7
